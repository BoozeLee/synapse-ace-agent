<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rhythmic Rituals Poster</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="poster-body">
  <main class="poster-sheet">
    <section class="poster-art">
      <div class="orbit one"></div>
      <div class="orbit two"></div>
      <div class="poster-mark">RR</div>
    </section>
    <section class="poster-copy">
      <p>001 / The Threshold</p>
      <h1>Rhythmic Rituals</h1>
      <h2>Dance. Percussion. Micro-rituals. Afterglow.</h2>
      <div class="poster-details">
        <span>Amsterdam / Brussels</span>
        <span>Secret venue</span>
        <span>21:00 - late</span>
      </div>
      <p class="poster-note">A participatory night where the room becomes the ritual.</p>
    </section>
  </main>
</body>
</html>
