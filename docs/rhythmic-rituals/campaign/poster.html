<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rhythmic Ritual ◉ ANIMÆ Poster</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="poster-body">
  <main class="poster-sheet">
    <section class="poster-art">
      <img class="poster-logo" src="assets/rhythmic-ritual-logo.jpg" alt="Rhythmic Ritual logo" />
    </section>
    <section class="poster-copy">
      <p>RHYTHMIC RITUAL ◉ / EDITION 01</p>
      <h1>ANIMÆ</h1>
      <h2>Minimal techno. Progressive pressure. No mascot.</h2>
      <div class="poster-details">
        <span>Belgium</span>
        <span>End August 2026</span>
        <span>Venue later</span>

      <p class="poster-note">The animals left. The souls stayed. Convenient, really.</p>
    </section>
  </main>
</body>
</html>
